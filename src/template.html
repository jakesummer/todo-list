<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="icon" href="imgs/favicon.ico" type="image/x-icon">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Todo List</title>
</head>
<body>
    <header>
        <div>
            <h1><span id="project-name-heading">General</span></h1>
            <p>You have <span id="todo-count"></span> <span id="todo-count-label">todos</span> remaining.</p>
        </div>
        <button class="primary-btn" id="new-todo-btn">+ New Todo</button>
    </header>

    <div id="sidebar">
        <p class="sidebar-heading">Projects</p>
        <ul id="projects-container">
        </ul>
        <button class="secondary-btn" id="new-project-btn">+ New Project</button>
    </div>

    <div id="content">
    </div>

    <dialog id="new-todo-modal" autofocus>
        <form id="new-todo-form" data-mode="create"> <!-- Mode: create to create new todo, edit to edit todo -->
            <fieldset>
                <legend id="new-todo-modal-header">Create New Todo</legend>

                <div class="label-input-group">
                    <label for="new-title-input">Todo Title</label>
                    <input type="text" id="new-title-input" placeholder="e.g. CS Homework" required>
                </div>
                <div class="label-input-group">
                    <label for="new-description-input">Todo Description</label>
                    <textarea id="new-description-input" cols="40" rows="10" placeholder="e.g. Implement a binary search tree in Python and submit to Gradescope."></textarea>
                </div>
                <div class="input-group">
                    <div class="label-input-group">
                        <label for="new-due-date-input">Due Date</label>
                        <input type="datetime-local" id="new-due-date-input" required>
                    </div>
                    <div class="label-input-group select-container">
                        <label for="new-todo-project-dropdown">Project</label>
                        <select id="new-todo-project-dropdown" required></select>
                    </div>
                </div>
                <div class="label-input-group">
                    <p class="priority-label">Priority</p>
                    <div class="priority-input-grid">
                        <div class="priority-input-label-group">
                            <input type="radio" name="priority-input" id="low-priority-input" value="low" required>
                            <label class="priority-radio-label" for="low-priority-input">Low</label>
                        </div>
                        <div class="priority-input-label-group">
                            <input type="radio" name="priority-input" id="medium-priority-input" value="medium">
                            <label class="priority-radio-label" for="medium-priority-input">Medium</label>
                        </div>
                        <div class="priority-input-label-group">
                            <input type="radio" name="priority-input" id="high-priority-input" value="high">
                            <label class="priority-radio-label" for="high-priority-input">High</label>
                        </div>
                    </div>
                </div>

                <div class="btn-group">
                    <button class="cancel-btn" type="button" id="cancel-todo-btn">Cancel</button>
                    <button class="primary-btn" id="create-todo-btn">Create Todo</button>
                </div>
            </fieldset>
        </form>
    </dialog>

    <dialog id="todo-details-modal" autofocus>
        <p id="details-title"></p>
        <p id="details-priority"></p>
        <p>Project: <span id="details-project"></span></p>
        <p>Due Date: <span id="details-due-date"></span></p>
        <p>Details: <span id="details-description"></span></p>
        <button id="close-todo-details-btn">Close</button>
    </dialog>

    <dialog id="new-project-modal" autofocus>
        <form id="new-project-form" data-mode="create">
                <fieldset>
                    <legend>Create New Project</legend>
                    <div class="label-input-group">
                        <label for="new-project-name">Project Name</label>
                        <input type="text" id="new-project-name" placeholder="e.g. School Work" required>
                    </div>
                    <div class="btn-group">
                        <button type="button" id="delete-project-btn">
                            <svg width="20" height="20" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><g id="SVGRepo_bgCarrier"></g><g id="SVGRepo_tracerCarrier" stroke-linecap="round" stroke-linejoin="round"></g><g id="SVGRepo_iconCarrier"> <path d="M4 6H20M16 6L15.7294 5.18807C15.4671 4.40125 15.3359 4.00784 15.0927 3.71698C14.8779 3.46013 14.6021 3.26132 14.2905 3.13878C13.9376 3 13.523 3 12.6936 3H11.3064C10.477 3 10.0624 3 9.70951 3.13878C9.39792 3.26132 9.12208 3.46013 8.90729 3.71698C8.66405 4.00784 8.53292 4.40125 8.27064 5.18807L8 6M18 6V16.2C18 17.8802 18 18.7202 17.673 19.362C17.3854 19.9265 16.9265 20.3854 16.362 20.673C15.7202 21 14.8802 21 13.2 21H10.8C9.11984 21 8.27976 21 7.63803 20.673C7.07354 20.3854 6.6146 19.9265 6.32698 19.362C6 18.7202 6 17.8802 6 16.2V6M14 10V17M10 10V17" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"></path> </g></svg>
                            Delete
                        </button>
                        <button class="cancel-btn" type="button" id="cancel-project-btn">Cancel</button>
                        <button class="primary-btn" id="create-project-btn">Create Project</button>
                    </div>
                </fieldset>
            </form>
    </dialog>
</body>
</html>
